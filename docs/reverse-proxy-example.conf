# =====================================================================
# Ejemplos de configuración para tu reverse proxy externo (nginx).
# Elegí UNA de las dos opciones, según cómo quieras exponer Chimi.
#
# El compose expone:
#   - chimi-front       en 127.0.0.1:18082  (SPA estática)
#   - chimi-api         en 127.0.0.1:18080  (REST + actuator)
#   - chimi-wpp-worker  en 127.0.0.1:18081  (webhook de WhatsApp)
# =====================================================================


# =====================================================================
# OPCIÓN A — Path-based bajo un dominio ya existente (recomendada si
# no querés crear subdominios nuevos)
#
# Asume:
#   gateway.liro.pet/chimi/         → dashboard
#   gateway.liro.pet/chimi/api/...  → API
#   gateway.liro.pet/chimi/webhook  → webhook de WhatsApp
#
# Para que el front funcione bajo /chimi/, en el .env del proyecto:
#   VITE_BASE_PATH=/chimi/
#   VITE_API_BASE_URL=/chimi/api
# =====================================================================

server {
    listen 443 ssl http2;
    server_name gateway.liro.pet;

    ssl_certificate     /etc/letsencrypt/live/gateway.liro.pet/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gateway.liro.pet/privkey.pem;

    # --- otros location blocks de tu otro proyecto van fuera de los siguientes ---

    # Webhook de WhatsApp (Meta exige HTTPS público válido)
    # location = ... fuerza match exacto, no choca con /chimi/
    location = /chimi/webhook {
        proxy_pass         http://127.0.0.1:18081/webhook;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # API REST. El trailing slash en proxy_pass strippea /chimi/api/ → /api/
    location /chimi/api/ {
        proxy_pass         http://127.0.0.1:18080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    # Bloquear endpoints internos desde afuera (defensa en profundidad —
    # el filtro de la app valida X-Internal-Api-Key igual)
    location /chimi/api/internal/ { return 404; }

    # Dashboard (SPA). El trailing slash en proxy_pass strippea /chimi/
    # antes de mandar al nginx interno del contenedor del front.
    location /chimi/ {
        proxy_pass         http://127.0.0.1:18082/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}


# =====================================================================
# OPCIÓN B — Subdominios dedicados (si preferís separar limpio)
#
# Asume:
#   chimi.liro.pet         → dashboard + /api
#   chimi-wpp.liro.pet     → webhook de WhatsApp
#
# Para esta opción, en el .env del proyecto:
#   VITE_BASE_PATH=/
#   VITE_API_BASE_URL=/api
# =====================================================================

